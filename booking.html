<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Travels - Flight Booking</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #25D366; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .app-card { max-width: 450px; background: white; margin: 10px auto; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .header { background: var(--primary); padding: 20px; text-align: center; color: white; }
        .header h2 { margin: 0; font-size: 22px; text-transform: uppercase; }
        
        .form-body { padding: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; font-size: 13px; }
        label span { color: var(--primary); font-size: 11px; }
        
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 15px; background: #fafafa; }
        input:focus, select:focus { border-color: var(--primary); outline: none; background: #fff; }

        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }

        .btn-wa { display: block; width: 100%; border: none; background: var(--secondary); color: white; text-align: center; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; text-decoration: none; }
        .btn-pay { display: block; background: #fff; color: var(--primary); text-align: center; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 14px; margin-top: 10px; border: 2px solid var(--primary); }
        
        .footer-text { text-align: center; font-size: 11px; color: #999; margin-top: 15px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h2>✈️ HAMZA TRAVELS</h2>
        <p style="margin:5px 0 0; font-size:12px;">Easy Booking / आसान बुकिंग</p>
    </div>

    <div class="form-body">
        <div class="input-group">
            <label>Select Airline <span>(एयरलाइन चुनें)</span></label>
            <select id="airline">
                <option value="Air India">1. Air India</option>
                <option value="Saudi Airlines">2. Saudi Airlines</option>
                <option value="IndiGo">3. IndiGo</option>
                <option value="Oman Air">4. Oman Air</option>
            </select>
        </div>

        <div class="row">
            <div class="input-group">
                <label>From <span>(कहाँ से)</span></label>
                <input type="text" id="from" placeholder="Source">
            </div>
            <div class="input-group">
                <label>To <span>(कहाँ तक)</span></label>
                <input type="text" id="to" placeholder="Destination">
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label>Travel Date <span>(तारीख)</span></label>
                <input type="date" id="date">
            </div>
            <div class="input-group">
                <label>Budget <span>(बजट)</span></label>
                <input type="number" id="budget" placeholder="₹">
            </div>
        </div>

        <div class="input-group">
            <label>Passenger Name <span>(नाम)</span></label>
            <input type="text" id="name" placeholder="Full Name">
        </div>

        <button onclick="sendWhatsApp()" class="btn-wa">💬 Send Inquiry on WhatsApp</button>
        
        <a href="https://shohrabshaikh1992.github.io/Payment-/" class="btn-pay">💳 Proceed to Payment</a>
        
        <p class="footer-text">24/7 Customer Support available</p>
    </div>
</div>

<script>
    function sendWhatsApp() {
        var airline = document.getElementById('airline').value;
        var from = document.getElementById('from').value;
        var to = document.getElementById('to').value;
        var date = document.getElementById('date').value;
        var budget = document.getElementById('budget').value;
        var name = document.getElementById('name').value;
        
        var phoneNumber = "919004144145"; // Confirm your number here
        
        if(from == "" || to == "" || name == "") {
            alert("Please fill all details!");
            return;
        }

        var message = "*✈️ NEW BOOKING ENQUIRY*%0A" + 
                      "----------------------------%0A" +
                      "*Airline:* " + airline + "%0A" +
                      "*Passenger:* " + name + "%0A" +
                      "*Route:* " + from + " to " + to + "%0A" + 
                      "*Date:* " + date + "%0A" +
                      "*Budget:* ₹" + budget + "%0A" +
                      "----------------------------%0A" +
                      "Please confirm ticket availability.";

        window.open("https://wa.me/" + phoneNumber + "?text=" + message, '_blank');
    }
</script>

</body>
</html>
