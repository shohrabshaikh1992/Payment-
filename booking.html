<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Travels - Flight Booking</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 450px; background: white; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        .btn-wa { display: block; width: 100%; border: none; background: #25D366; color: white; text-align: center; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        .btn-pay { display: block; background: #1a73e8; color: white; text-align: center; padding: 16px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 16px; margin-top: 15px; box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3); }
        
        .divider { text-align: center; margin: 25px 0 10px 0; color: #777; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .note { font-size: 12px; color: #666; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>✈️ Hamza Travels</h2>
    
    <div class="input-group">
        <label>From (Kahan se):</label>
        <input type="text" id="from" placeholder="Enter City">
    </div>

    <div class="input-group">
        <label>To (Kahan tak):</label>
        <input type="text" id="to" placeholder="Enter Destination">
    </div>

    <div class="input-group">
        <label>Travel Date:</label>
        <input type="date" id="date">
    </div>

    <button onclick="sendWhatsApp()" class="btn-wa">💬 Send Inquiry on WhatsApp</button>
    <p class="note">Pehle WhatsApp par availability check karein.</p>

    <div class="divider">OR PAY DIRECTLY</div>

    <a href="https://shohrabshaikh1992.github.io/Payment-/" class="btn-pay">💳 Proceed to Payment</a>
</div>

<script>
    function sendWhatsApp() {
        var from = document.getElementById('from').value;
        var to = document.getElementById('to').value;
        var date = document.getElementById('date').value;
        
        // --- APNA WHATSAPP NUMBER YAHAN DALAIN (91 ke saath) ---
        var phoneNumber = "919004144145"; 
        
        if(from == "" || to == "" || date == "") {
            alert("Please fill all details!");
            return;
        }

        var message = "*New Flight Inquiry - Hamza Travels*%0A%0A" + 
                      "*From:* " + from + "%0A" + 
                      "*To:* " + to + "%0A" + 
                      "*Date:* " + date + "%0A%0A" +
                      "Bhai, availability aur price check karke bataiye.";

        window.open("https://wa.me/" + phoneNumber + "?text=" + message, '_blank');
    }
</script>

</body>
</html>
