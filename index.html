<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Travels - Language Support</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #25D366; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .app-card { max-width: 480px; background: white; margin: 10px auto; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Language Bar */
        .lang-bar { display: flex; justify-content: center; gap: 10px; padding: 10px; background: #e8f0fe; border-bottom: 1px solid #ddd; }
        .lang-btn { padding: 5px 15px; border: 1px solid var(--primary); border-radius: 20px; font-size: 12px; cursor: pointer; background: white; color: var(--primary); font-weight: bold; transition: 0.3s; }
        .lang-btn.active { background: var(--primary); color: white; }

        .header { background: var(--primary); padding: 20px; text-align: center; color: white; }
        .header h2 { margin: 0; font-size: 22px; letter-spacing: 1px; }

        .form-body { padding: 20px; }
        h3 { font-size: 16px; color: var(--primary); margin-bottom: 15px; text-align: center; }

        /* Airline Grid */
        .airline-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .airline-item { position: relative; text-align: center; }
        .airline-item input { position: absolute; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 2; }
        .airline-label { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px 5px; border: 1.5px solid #eee; border-radius: 12px; cursor: pointer; transition: 0.3s; height: 90px; background: #fff;
        }
        .airline-label img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; }
        .airline-label span { font-size: 9px; font-weight: bold; color: #555; }
        
        .airline-item input:checked + .airline-label { border-color: var(--primary); background: #e8f0fe; }
        .airline-item input:checked + .airline-label::after { content: '✓'; position: absolute; bottom: 5px; right: 5px; background: var(--primary); color: white; border-radius: 50%; width: 15px; height: 15px; font-size: 10px; line-height: 15px; text-align: center; }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .field { flex: 1; }
        label { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 14px; background: #fafafa; }

        .btn-wa { display: block; width: 100%; border: none; background: var(--secondary); color: white; text-align: center; padding: 16px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; text-decoration: none; }
        .btn-pay { display: block; background: #fff; color: var(--primary); text-align: center; padding: 14px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 14px; margin-top: 10px; border: 2px solid var(--primary); }
    </style>
</head>
<body>

        <div class="airline-grid">
            <div class="airline-item">
                <input type="radio" name="airline" value="Air India" id="ai" checked>
                <label class="airline-label" for="ai">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Air_India_Logo.svg" alt="AI">
                    <span>Air India</span>
                </label>
            </div>
            <div class="airline-item">
                <input type="radio" name="airline" value="Saudi Airlines" id="sa">
                <label class="airline-label" for="sa">
                    <img src="https://www.saudia.com/content/dam/saudia/Global/Images/Logos/saudia-logo-gold.svg" alt="SA">
                    <span>Saudi Air</span>
                </label>
            </div>
            <div class="airline-item">
                <input type="radio" name="airline" value="IndiGo" id="ig">
                <label class="airline-label" for="ig">
                    <img src="https://www.goindigo.in/content/dam/indigov2/6e-website/header/indigo-logo.png" alt="IG">
                    <span>IndiGo</span>
                </label>
            </div>
            <div class="airline-item">
                <input type="radio" name="airline" value="Oman Air" id="oa">
                <label class="airline-label" for="oa">
                    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/d/d4/Oman_Air_logo.svg/1024px-Oman_Air_logo.svg.png" alt="OA">
                    <span>Oman Air</span>
                </label>
            </div>
        </div>
