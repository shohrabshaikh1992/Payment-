<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Travels - Language Support</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #25D366; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .app-card { max-width: 480px; background: white; margin: 10px auto; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Language Bar */
        .lang-bar { display: flex; justify-content: center; gap: 10px; padding: 10px; background: #e8f0fe; border-bottom: 1px solid #ddd; }
        .lang-btn { padding: 5px 15px; border: 1px solid var(--primary); border-radius: 20px; font-size: 12px; cursor: pointer; background: white; color: var(--primary); font-weight: bold; transition: 0.3s; }
        .lang-btn.active { background: var(--primary); color: white; }

        .header { background: var(--primary); padding: 20px; text-align: center; color: white; }
        .header h2 { margin: 0; font-size: 22px; letter-spacing: 1px; }

        .form-body { padding: 20px; }
        h3 { font-size: 16px; color: var(--primary); margin-bottom: 15px; text-align: center; }

        /* Airline Grid */
        .airline-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .airline-item { position: relative; text-align: center; }
        .airline-item input { position: absolute; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 2; }
        .airline-label { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px 5px; border: 1.5px solid #eee; border-radius: 12px; cursor: pointer; transition: 0.3s; height: 90px; background: #fff;
        }
        .airline-label img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; }
        .airline-label span { font-size: 9px; font-weight: bold; color: #555; }
        
        .airline-item input:checked + .airline-label { border-color: var(--primary); background: #e8f0fe; }
        .airline-item input:checked + .airline-label::after { content: '✓'; position: absolute; bottom: 5px; right: 5px; background: var(--primary); color: white; border-radius: 50%; width: 15px; height: 15px; font-size: 10px; line-height: 15px; text-align: center; }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .field { flex: 1; }
        label { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 14px; background: #fafafa; }

        .btn-wa { display: block; width: 100%; border: none; background: var(--secondary); color: white; text-align: center; padding: 16px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; text-decoration: none; }
        .btn-pay { display: block; background: #fff; color: var(--primary); text-align: center; padding: 14px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 14px; margin-top: 10px; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="app-card">
    <div class="lang-bar">
        <div class="lang-btn active" onclick="setLang('en', this)">English</div>
        <div class="lang-btn" onclick="setLang('hi', this)">हिन्दी</div>
    </div>

    <div class="header">
        <h2 id="headTitle">✈️ HAMZA TRAVELS</h2>
        <p id="headSub" style="margin:5px 0 0; font-size:12px; opacity:0.9;">Premium Booking Service</p>
    </div>

    <div class="form-body">
        <h3 id="selectTitle">Choose Airline / फ़्लाइट चुनें</h3>
        
        <div class="airline-grid">
            <div class="airline-item">
                <input type="radio" name="airline" value="Air India" id="ai" checked>
                <label class="airline-label" for="ai">
                    <img src="https://img.icons8.com/color/96/air-india.png" alt="AI">
                    <span>Air India</span>
                </label>
            </div>
            <div class="airline-item">
                <input type="radio" name="airline" value="Saudi Airlines" id="sa">
                <label class="airline-label" for="sa">
                    <img src="https://img.icons8.com/color/96/saudi-arabia-flag.png" alt="SA">
                    <span>Saudi Air</span>
                </label>
            </div>
            <div class="airline-item">
                <input type="radio" name="airline" value="IndiGo" id="ig">
                <label class="airline-label" for="ig">
                    <img src="https://img.icons8.com/fluent/96/airplane-take-off.png" alt="IG">
                    <span>IndiGo</span>
                </label>
            </div>
            <div class="airline-item">
                <input type="radio" name="airline" value="Oman Air" id="oa">
                <label class="airline-label" for="oa">
                    <img src="https://img.icons8.com/color/96/oman-flag.png" alt="OA">
                    <span>Oman Air</span>
                </label>
            </div>
        </div>

        <div class="input-row">
            <div class="field">
                <label id="lblFrom">From</label>
                <input type="text" id="from" placeholder="City">
            </div>
            <div class="field">
                <label id="lblTo">To</label>
                <input type="text" id="to" placeholder="City">
            </div>
        </div>

        <div class="input-row">
            <div class="field">
                <label id="lblDate">Date</label>
                <input type="date" id="date">
            </div>
            <div class="field">
                <label id="lblBudget">Budget</label>
                <input type="number" id="budget" placeholder="₹">
            </div>
        </div>

        <div class="field" style="margin-bottom: 20px;">
            <label id="lblName">Passenger Name</label>
            <input type="text" id="name" placeholder="Full Name">
        </div>

        <button onclick="sendWhatsApp()" class="btn-wa" id="btnWa">💬 Send Inquiry</button>
        <a href="https://shohrabshaikh1992.github.io/Payment-/" class="btn-pay" id="btnPay">💳 Proceed to Payment</a>
    </div>
</div>

<script>
    function setLang(lang, btn) {
        // Update Buttons
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Text Content
        const texts = {
            en: {
                head: "✈️ HAMZA TRAVELS", sub: "Premium Booking Service", select: "Choose Airline",
                from: "From", to: "To", date: "Date", budget: "Budget", name: "Passenger Name",
                wa: "💬 Send Inquiry", pay: "💳 Proceed to Payment"
            },
            hi: {
                head: "✈️ हमज़ा ट्रैवल्स", sub: "प्रीमियम बुकिंग सेवा", select: "फ़्लाइट चुनें",
                from: "कहाँ से", to: "कहाँ तक", date: "तारीख", budget: "बजट", name: "यात्री का नाम",
                wa: "💬 जानकारी भेजें", pay: "💳 पेमेंट करें"
            }
        };

        document.getElementById('headTitle').innerText = texts[lang].head;
        document.getElementById('headSub').innerText = texts[lang].sub;
        document.getElementById('selectTitle').innerText = texts[lang].select;
        document.getElementById('lblFrom').innerText = texts[lang].from;
        document.getElementById('lblTo').innerText = texts[lang].to;
        document.getElementById('lblDate').innerText = texts[lang].date;
        document.getElementById('lblBudget').innerText = texts[lang].budget;
        document.getElementById('lblName').innerText = texts[lang].name;
        document.getElementById('btnWa').innerText = texts[lang].wa;
        document.getElementById('btnPay').innerText = texts[lang].pay;
    }

    function sendWhatsApp() {
        var airline = document.querySelector('input[name="airline"]:checked').value;
        var from = document.getElementById('from').value;
        var to = document.getElementById('to').value;
        var date = document.getElementById('date').value;
        var budget = document.getElementById('budget').value;
        var name = document.getElementById('name').value;
        var phoneNumber = "919519266964"; 
        
        if(from == "" || to == "" || name == "") { alert("Details bhariye!"); return; }

        var message = "*✈️ HAMZA TRAVELS - ENQUIRY*%0A" + 
                      "*Airline:* " + airline + "%0A" +
                      "*Name:* " + name + "%0A" +
                      "*Route:* " + from + " to " + to + "%0A" + 
                      "*Budget:* ₹" + budget + "%0A" +
                      "Bhai, availability check karke batana.";
        window.open("https://wa.me/" + phoneNumber + "?text=" + message, '_blank');
    }
</script>

</body>
</html>
