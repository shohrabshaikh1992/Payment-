<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Hamza Creation - Payment</title>
    <style>

        .upi-id { background: #f9f9f9; padding: 8px; border-radius: 5px; font-weight: bold; color: #34495e; font-size: 13px; margin-bottom: 20px; border: 1px dashed #bdc3c7; }
        .pay-btn { display: block; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
        .all-apps { background: #27ae60; color: white; }

<body>

<div class="card">
    <h2>Hamza Creation</h2>

    <div class="qr-box">

    <div class="upi-id">
        UPI ID: BHARATPE2C0R0F1H5I75911@unitype

</html>
